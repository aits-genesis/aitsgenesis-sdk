name: Release

on:
  push:
    branches: [main, next, beta]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

# Use Node.js 24 runtime for all GitHub Actions (avoids Node 20 deprecation)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@aits-genesis'

      - run: npm ci

      - name: Build all libraries
        run: npm run build:all

      - name: Release (version + changelog + GitHub Release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Publish libraries to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find all package.json files 2 levels deep (handles @scope/name layout)
          # e.g. dist/aits-genesis/core/package.json
          found=0
          while IFS= read -r pkg_json; do
            pkg_dir=$(dirname "$pkg_json")
            echo "Publishing $pkg_dir ..."
            npm publish "$pkg_dir" --access public
            found=1
          done < <(find dist -mindepth 2 -maxdepth 3 -name "package.json" 2>/dev/null)
          if [ "$found" -eq 0 ]; then
            echo "No dist packages found — nothing to publish"
          fi
