name: Release

on:
  push:
    branches: [main, next, beta]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write   # required to publish to GitHub Packages

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@aits-genesis'

      - run: npm ci

      - name: Build all libraries
        run: npm run build:all

      # semantic-release: bumps version, writes CHANGELOG, creates GitHub Release, git tag
      - name: Release (version + changelog + GitHub Release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      # Publish each built library to GitHub Packages
      # When libraries are added, their dist/ folder contains a publishable package.json
      - name: Publish libraries to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg_dir in dist/*/; do
            if [ -f "$pkg_dir/package.json" ]; then
              echo "Publishing $pkg_dir ..."
              npm publish "$pkg_dir" --access public
            fi
          done
          echo "Publish step complete (no dist packages = nothing to publish)"
